name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://wfahexidhokjrnlqaaha.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndmYWhleGlkaG9ranJubHFhYWhhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NDAwMDMsImV4cCI6MjA5MDQxNjAwM30.ruCSxVLt5nOnpVn9I-2LlJ4-_VJ6P9P28m7smRg9Xg8

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4